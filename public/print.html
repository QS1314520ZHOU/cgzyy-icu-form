<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打印数据预览</title>
  <link rel="stylesheet" href="/css/print.css" />
</head>
<body>
  <main class="print-page">
    <header class="hero no-print">
      <div class="hero-copy">
        <p class="eyebrow">Iframe Print View</p>
        <h1 id="pageTitle">打印数据预览</h1>
        <p id="pageDesc" class="hero-desc">等待父页面通过 postMessage 发送打印数据。</p>
      </div>
      <div class="hero-actions">
        <button id="btnSample" class="btn btn-secondary" type="button">加载示例</button>
        <button id="btnClear" class="btn btn-muted" type="button">清空内容</button>
        <button id="btnPrint" class="btn btn-primary" type="button">打印</button>
      </div>
    </header>

    <section class="panel no-print">
      <div class="panel-title-row">
        <h2>消息状态</h2>
        <span id="messageState" class="state-badge">等待消息</span>
      </div>
      <p class="panel-tip">父页面可以发送 <code>{ type: 'PRINT_DATA', payload: {...} }</code>，也支持直接发送对象。</p>
      <pre id="rawMessage" class="code-block">暂无消息</pre>
    </section>

    <section class="panel print-panel">
      <div class="panel-title-row">
        <h2>打印内容</h2>
        <span id="updatedAt" class="updated-at"></span>
      </div>

      <div id="emptyState" class="empty-state">
        <p>当前还没有可打印的数据。</p>
        <p>请从父页面通过 <code>postMessage</code> 传入数据。</p>
      </div>

      <div id="contentArea" class="content-area hidden">
        <section id="summarySection" class="summary-grid"></section>

        <section class="content-block">
          <h3>打印字段</h3>
          <div class="table-wrap">
            <table class="print-table">
              <thead>
                <tr>
                  <th>字段</th>
                  <th>值</th>
                </tr>
              </thead>
              <tbody id="fieldBody"></tbody>
            </table>
          </div>
        </section>

        <section class="content-block">
          <h3>原始数据</h3>
          <pre id="jsonContent" class="code-block code-block-light">{}</pre>
        </section>
      </div>
    </section>
  </main>

  <script src="/js/print.js"></script>
</body>
</html>
