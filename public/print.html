<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据预览</title>
  <link rel="stylesheet" href="/css/print.css" />
</head>
<body>
  <main class="print-page">
    <header class="hero no-print">
      <div class="hero-copy">
        <p class="eyebrow">SmartCare Iframe View</p>
        <h1 id="pageTitle">数据预览</h1>
        <p id="pageDesc" class="hero-desc">等待宿主通过 postMessage 发送数据。</p>
      </div>
      <div class="hero-actions">
        <button id="btnClear" class="btn btn-muted" type="button">清空内容</button>
      </div>
    </header>

    <section class="panel no-print">
      <div class="panel-title-row">
        <h2>消息状态</h2>
        <span id="messageState" class="state-badge">等待消息</span>
      </div>
      <p class="panel-tip">宿主发送 <code>{ type: 'PRINT_DATA', payload: {...} }</code>，也支持 <code>RESPONSE_DATA</code>。</p>
      <pre id="rawMessage" class="code-block">暂无消息</pre>
    </section>

    <section class="panel no-print">
      <div class="panel-title-row">
        <h2>通信日志</h2>
        <button id="btnClearLog" class="btn btn-muted btn-sm" type="button">清空日志</button>
      </div>
      <div id="logContent" class="log-content"></div>
    </section>

    <section class="panel print-panel">
      <div class="panel-title-row">
        <h2>数据输出</h2>
        <span id="updatedAt" class="updated-at"></span>
      </div>

      <div id="emptyState" class="empty-state">
        <p>当前还没有数据。</p>
        <p>请从宿主通过 <code>postMessage</code> 传入数据。</p>
      </div>

      <div id="contentArea" class="content-area hidden">
        <section class="content-block">
          <h3>字段列表</h3>
          <div class="table-wrap">
            <table class="print-table">
              <thead>
                <tr>
                  <th>字段</th>
                  <th>值</th>
                </tr>
              </thead>
              <tbody id="fieldBody"></tbody>
            </table>
          </div>
        </section>

        <section class="content-block">
          <h3>原始 JSON</h3>
          <pre id="jsonContent" class="code-block code-block-light">{}</pre>
        </section>
      </div>
    </section>
  </main>

  <script src="/js/print.js"></script>
</body>
</html>
