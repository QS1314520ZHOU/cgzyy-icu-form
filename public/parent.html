<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICU 数据展示</title>
  <link rel="stylesheet" href="/css/print.css" />
  <style>
    body { background: #f5f7fa; }
    .host-page { width: min(1200px, calc(100% - 32px)); margin: 0 auto; padding: 16px 0 40px; }
    .section-title { font-size: 16px; font-weight: 700; color: #1e3a8a; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #d7e6ff; }
    .field-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .field-table th, .field-table td { padding: 8px 12px; border-bottom: 1px solid #e5edf6; text-align: left; vertical-align: top; }
    .field-table th { background: #edf4ff; color: #1d4ed8; font-weight: 600; width: 200px; white-space: nowrap; }
    .field-table tr:nth-child(even) td { background: #fafcff; }
    .nested-json { font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-word; color: #334155; background: #f8fbff; padding: 8px; border-radius: 6px; }
    .token-masked { font-family: monospace; letter-spacing: 2px; }
  </style>
</head>
<body>
  <main class="host-page">
    <!-- 状态栏 -->
    <section class="panel no-print">
      <div class="panel-title-row">
        <h2>连接状态</h2>
        <span id="messageState" class="state-badge">等待外层数据</span>
      </div>
      <p class="panel-tip">本页嵌入 SmartCare 系统，通过 postMessage 接收患者/账号数据。</p>
    </section>

    <!-- 置顶关键信息 -->
    <section class="panel" id="keyInfoPanel" style="display:none;">
      <div class="panel-title-row">
        <h2>患者关键信息</h2>
        <span id="updatedAt" class="updated-at"></span>
      </div>
      <div id="keyInfoGrid" class="key-info-grid"></div>
    </section>

    <!-- 通信日志 -->
    <section class="panel no-print">
      <div class="panel-title-row">
        <h2>通信日志</h2>
        <button id="btnClearLog" class="btn btn-muted btn-sm" type="button">清空日志</button>
      </div>
      <div id="logContent" class="log-content"></div>
    </section>

    <!-- 数据输出 -->
    <section class="panel">
      <div class="panel-title-row">
        <h2>数据输出</h2>
      </div>

      <div id="emptyState" class="empty-state">
        <p>当前还没有数据。</p>
        <p>等待 SmartCare 宿主通过 <code>postMessage</code> 下发数据。</p>
      </div>

      <div id="contentArea" class="content-area hidden">
        <!-- 账号信息 -->
        <div id="accountSection" class="content-block">
          <h3 class="section-title">账号信息</h3>
          <div class="table-wrap">
            <table class="field-table" id="accountTable"><tbody></tbody></table>
          </div>
        </div>

        <!-- 患者完整信息 -->
        <div id="patientSection" class="content-block">
          <h3 class="section-title">患者完整信息</h3>
          <div class="table-wrap">
            <table class="field-table" id="patientTable"><tbody></tbody></table>
          </div>
        </div>

        <!-- 原始 JSON -->
        <div id="jsonSection" class="content-block">
          <h3 class="section-title">完整原始 JSON</h3>
          <button id="btnToggleJson" class="json-toggle" type="button">展开查看</button>
          <pre id="jsonContent" class="code-block code-block-light json-collapsed"></pre>
        </div>
      </div>
    </section>

    <!-- 内层 iframe -->
    <section class="panel no-print">
      <div class="panel-title-row">
        <h2>内层数据预览</h2>
      </div>
      <div style="border:1px solid #d9e4f2; border-radius:14px; overflow:hidden; height:400px;">
        <iframe id="childFrame" src="/print" style="width:100%; height:100%; border:none;"></iframe>
      </div>
    </section>
  </main>

  <script>
  // ★ 探针：在所有逻辑之前注册，捕获所有 postMessage
  window.addEventListener('message', function probeHandler(e) {
    try {
      var d = e.data;
      var type = d && typeof d === 'object' ? d.type : typeof d;
      var hasAccount = !!(d && d.account);
      var hasPatient = !!(d && d.patient);
      console.log('[probe-parent] origin=' + e.origin + ' type=' + type +
        ' hasAccount=' + hasAccount + ' hasPatient=' + hasPatient,
        'data=', d);
    } catch (err) {
      console.log('[probe-parent] origin=' + e.origin + ' parseError=' + err.message);
    }
  }, false);

  (function() {
    'use strict';

    // ── 常量 ──────────────────────────────────────────────

    // ★ origin 白名单：已确认的 SmartCare origin
    const ORIGIN_WHITELIST = [
      location.origin,
      'http://10.35.4.10:60000',  // SmartCare 生产环境
    ];

    // 内层通信 type
    const PRINT_DATA = 'PRINT_DATA';
    const CLEAR_DATA = 'CLEAR_DATA';

    // 枚举映射
    const GENDER_MAP = { Female: '女', Male: '男' };
    const STATUS_MAP = { admitted: '在科', discharged: '出科' };

    // 时间字段名关键词
    const TIME_FIELD_KEYWORDS = ['Time', 'time', 'birthday', 'createdTime', 'bedTime', 'Admission', 'admission'];

    // 置顶关键信息字段定义
    const KEY_FIELDS = [
      { key: 'name', label: '患者姓名' },
      { key: 'gender', label: '性别', map: GENDER_MAP },
      { key: 'age', label: '年龄', fallback: ['childAge', 'admissionAge'] },
      { key: 'hisBed', label: '床位', fallback: ['showBed'] },
      { key: 'mrn', label: '住院号' },
      { key: 'hisPid', label: '住院流水号' },
      { key: 'dept', label: '科室' },
      { key: 'status', label: '状态', map: STATUS_MAP },
      { key: 'clinicalDiagnosis', label: '临床诊断', fallback: ['admissionDiagnosis'] },
      { key: 'icuAdmissionTime', label: 'ICU入科时间', isTime: true },
      { key: 'bedDoctorId', label: '管床医生', fallback: ['bedDoctor', 'treatedDoctor'] },
      { key: 'insuranceType', label: '费别' },
    ];

    // 存储键
    const STORAGE_KEY = 'ICU_HOST_DATA';
    const STORAGE_TIME_KEY = 'ICU_HOST_DATA_TIME';

    // ── DOM ───────────────────────────────────────────────
    const els = {
      messageState: document.getElementById('messageState'),
      updatedAt: document.getElementById('updatedAt'),
      keyInfoPanel: document.getElementById('keyInfoPanel'),
      keyInfoGrid: document.getElementById('keyInfoGrid'),
      logContent: document.getElementById('logContent'),
      btnClearLog: document.getElementById('btnClearLog'),
      emptyState: document.getElementById('emptyState'),
      contentArea: document.getElementById('contentArea'),
      accountTable: document.getElementById('accountTable'),
      patientTable: document.getElementById('patientTable'),
      jsonContent: document.getElementById('jsonContent'),
      btnToggleJson: document.getElementById('btnToggleJson'),
      childFrame: document.getElementById('childFrame'),
    };

    // ── 状态 ──────────────────────────────────────────────
    let currentPatientKey = '';
    let currentPayload = null;
    let isPlaceholder = false;

    // ── 初始化 ────────────────────────────────────────────
    bindEvents();
    init();

    function bindEvents() {
      els.btnClearLog.addEventListener('click', clearLog);
      els.btnToggleJson.addEventListener('click', toggleJson);

      // ★ 监听常驻：初始化即注册，全程保留
      window.addEventListener('message', handleMessage);

      // 页面卸载时清缓存
      window.addEventListener('pagehide', clearStorageOnly);
      window.addEventListener('beforeunload', clearStorageOnly);

      // 可见性变化时请求数据
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          addLog('[触发] visibilitychange → visible', 'info');
          requestData('visibilitychange');
        }
      });

      // pageshow 事件
      window.addEventListener('pageshow', event => {
        addLog(`[触发] pageshow, persisted=${event.persisted}`, 'info');
        requestData('pageshow');
      });

      // window focus 事件
      window.addEventListener('focus', () => {
        addLog('[触发] window focus', 'info');
        requestData('focus');
      });
    }

    function init() {
      restoreFromStorage();
      addLog('[初始化] 页面加载', 'info');
      requestData('init');
    }

    // ── 核心消息处理：无条件消费 ─────────────────────────
    function handleMessage(event) {
      // origin 校验（不静默丢）
      if (!isAllowedOrigin(event.origin)) {
        var warnMsg = `[安全] 来源校验失败: origin=${event.origin}，已忽略`;
        console.warn('[parent.html] ' + warnMsg);
        addLog(warnMsg, 'error');
        return;
      }

      try {
        const data = event.data;
        if (!data || typeof data !== 'object') return;

        // ★ 从 event.data 顶层取 type/account/patient/token
        const type = data.type;
        const account = data.account || (data.payload && data.payload.account);
        const patient = data.patient || (data.payload && data.payload.patient);
        const token = data.token || (data.payload && data.payload.token);

        // ★ "无病人"消息处理：type=SmartCare 但无 patient
        if (type === 'SmartCare' && !patient) {
          addLog('[收到] SmartCare 消息，但无 patient 数据，请选中病人', 'warning');
          setState('请选中病人', 'error');
          // 清空显示但保留占位
          return;
        }

        // ★ 只处理有 patient 的 SmartCare 消息
        if (type === 'SmartCare' && patient) {
          const patientKey = getPatientKey(patient);
          addLog(`[收到] SmartCare 消息, patientKey=${patientKey}, token=${token ? '有' : '无'}`, 'success');

          // 无条件重渲 + 每条都转发
          processData({ account, patient, token });
          return;
        }

        // 其他消息记录但不处理
        addLog(`[收到] 非 SmartCare 消息: type=${type}`, 'info');

      } catch (error) {
        addLog(`[错误] 消息处理失败: ${error.message}`, 'error');
      }
    }

    // ── 数据处理：无条件消费 ─────────────────────────────
    function processData(data) {
      const patientKey = getPatientKey(data.patient);

      addLog(`[处理] patientKey=${patientKey}, currentKey=${currentPatientKey || '(空)'}, isPlaceholder=${isPlaceholder}`, 'info');

      // ★ 唯一键变化：强制刷新（绕过任何去重）
      if (patientKey && currentPatientKey && patientKey !== currentPatientKey) {
        addLog(`[切换] 患者切换: ${currentPatientKey} → ${patientKey}`, 'warning');
      }

      // ★ 无条件更新状态
      currentPatientKey = patientKey;
      currentPayload = data;
      isPlaceholder = false;

      // 持久化
      persistData(data);

      // 无条件重渲
      renderAll(data);

      // ★ 无条件转发给内层 iframe
      forwardToIframe(data);
    }

    // ── 转发给内层 iframe（每条都转发）──────────────────
    function forwardToIframe(data) {
      try {
        els.childFrame.contentWindow.postMessage({
          type: PRINT_DATA,
          payload: { type: 'SmartCare', account: data.account, patient: data.patient }
        }, '*');
        const patientKey = getPatientKey(data.patient);
        addLog(`[转发] 已转发给内层 iframe, patientKey=${patientKey}`, 'info');
      } catch (error) {
        addLog(`[错误] 转发给 iframe 失败: ${error.message}`, 'error');
      }
    }

    // ── 请求数据 ──────────────────────────────────────────
    function requestData(reason) {
      addLog(`[请求] 向外层请求数据, reason=${reason}`, 'info');
      try {
        const target = window.parent !== window ? window.parent : (window.top !== window ? window.top : null);
        if (target) {
          target.postMessage({ type: 'REQUEST_HOST_DATA', payload: { reason } }, '*');
        }
      } catch (e) {
        addLog(`[错误] 请求失败: ${e.message}`, 'error');
      }
    }

    // ── 患者唯一键 ────────────────────────────────────────
    function getPatientKey(patient) {
      if (!patient) return '';
      return String(patient.id || patient.mrn || patient.hisPid || '');
    }

    // ── 渲染 ──────────────────────────────────────────────
    function renderAll(data) {
      const patientKey = getPatientKey(data.patient);
      setState('已获取数据', 'ready');
      els.updatedAt.textContent = `更新时间：${formatDateTime(new Date())}`;

      renderKeyInfo(data.patient);
      renderAccountTable(data.account);
      renderPatientTable(data.patient);
      renderJson(data);

      els.emptyState.classList.add('hidden');
      els.contentArea.classList.remove('hidden');
      els.keyInfoPanel.style.display = '';

      addLog(`[渲染] 完成, patientKey=${patientKey}`, 'success');
    }

    // 置顶关键信息
    function renderKeyInfo(patient) {
      const cards = KEY_FIELDS.map(field => {
        let value = getFieldValue(patient, field);
        if (field.map && value != null) {
          value = field.map[value] || value;
        }
        if (field.isTime && value != null) {
          const formatted = formatEpoch(value);
          value = formatted || value;
        }
        const display = formatDisplayValue(value);
        const isLong = display.length > 15;
        return `
          <article class="key-info-card">
            <div class="key-info-label">${escapeHtml(field.label)}</div>
            <div class="key-info-value${isLong ? ' small' : ''}">${escapeHtml(display)}</div>
          </article>
        `;
      }).join('');
      els.keyInfoGrid.innerHTML = cards;
    }

    // 获取字段值（支持 fallback）
    function getFieldValue(obj, field) {
      if (obj[field.key] != null && obj[field.key] !== '') return obj[field.key];
      if (field.fallback) {
        for (const fb of field.fallback) {
          if (obj[fb] != null && obj[fb] !== '') return obj[fb];
        }
      }
      return null;
    }

    // 账号信息表
    function renderAccountTable(account) {
      const rows = Object.entries(account || {}).map(([key, value]) =>
        `<tr><th>${escapeHtml(key)}</th><td>${formatCell(value, key)}</td></tr>`
      ).join('');
      els.accountTable.querySelector('tbody').innerHTML = rows;
    }

    // 患者完整信息表
    function renderPatientTable(patient) {
      const rows = Object.entries(patient || {}).map(([key, value]) =>
        `<tr><th>${escapeHtml(key)}</th><td>${formatCell(value, key)}</td></tr>`
      ).join('');
      els.patientTable.querySelector('tbody').innerHTML = rows;
    }

    // 原始 JSON（token 脱敏）
    function renderJson(data) {
      const safe = JSON.parse(JSON.stringify(data));
      if (safe.token) safe.token = maskToken(safe.token);
      els.jsonContent.textContent = safeStringify(safe);
    }

    // ── 单元格格式化 ──────────────────────────────────────
    function formatCell(value, fieldName) {
      if (value == null || value === '' || value === 'NaN') return '<span style="color:#94a3b8;">-</span>';

      // 对象/数组
      if (typeof value === 'object') {
        // 时间数组
        if (Array.isArray(value) && value.length > 0 && isTimeField(fieldName)) {
          return value.map(v => typeof v === 'number' ? (formatEpoch(v) || v) : v).map(escapeHtml).join('<br>');
        }
        return `<div class="nested-json">${escapeHtml(safeStringify(value))}</div>`;
      }

      // epoch 时间
      if (typeof value === 'number' && isTimeField(fieldName) && isEpoch(value)) {
        const formatted = formatEpoch(value);
        return `${escapeHtml(String(value))}<br><span style="color:#64748b;font-size:12px;">${escapeHtml(formatted)}</span>`;
      }

      return escapeHtml(String(value));
    }

    // ── 工具函数 ──────────────────────────────────────────
    function isAllowedOrigin(origin) {
      if (ORIGIN_WHITELIST.includes(origin)) return true;
      // 本地开发允许所有
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return true;
      return false;
    }

    function isTimeField(name) {
      return TIME_FIELD_KEYWORDS.some(kw => name.includes(kw));
    }

    function isEpoch(val) {
      return typeof val === 'number' && val > 1000000000000 && val < 9999999999999;
    }

    function formatEpoch(ms) {
      try {
        const d = new Date(ms);
        if (isNaN(d.getTime())) return null;
        return new Intl.DateTimeFormat('zh-CN', {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false, timeZone: 'Asia/Shanghai'
        }).format(d);
      } catch {
        return null;
      }
    }

    function formatDisplayValue(value) {
      if (value == null || value === '' || value === 'NaN') return '-';
      if (typeof value === 'object') return safeStringify(value);
      return String(value);
    }

    function maskToken(token) {
      if (!token || typeof token !== 'string') return '-';
      if (token.length <= 8) return '****';
      return token.slice(0, 4) + '****' + token.slice(-4);
    }

    function formatDateTime(date) {
      return new Intl.DateTimeFormat('zh-CN', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false, timeZone: 'Asia/Shanghai'
      }).format(date);
    }

    function safeStringify(value) {
      try { return JSON.stringify(value, null, 2); } catch { return String(value); }
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── 缓存（只作占位）──────────────────────────────────
    function persistData(data) {
      try {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        sessionStorage.setItem(STORAGE_TIME_KEY, String(Date.now()));
      } catch {}
    }

    function restoreFromStorage() {
      try {
        const cached = sessionStorage.getItem(STORAGE_KEY);
        if (!cached) {
          addLog('[缓存] 无缓存数据', 'info');
          return;
        }
        const data = JSON.parse(cached);
        const patientKey = getPatientKey(data.patient);
        const cachedTime = Number(sessionStorage.getItem(STORAGE_TIME_KEY) || 0);

        currentPayload = data;
        currentPatientKey = patientKey;
        isPlaceholder = true; // 标记为占位

        renderAll(data);

        if (cachedTime) {
          els.updatedAt.textContent = `更新时间：${formatDateTime(new Date(cachedTime))}（缓存占位）`;
        }
        setState('已从缓存恢复（等待最新数据）', 'ready');
        addLog(`[缓存] 已恢复, patientKey=${patientKey}, 标记为占位`, 'warning');

        // 同步给内层
        forwardToIframe(data);
      } catch {}
    }

    function clearStorageOnly() {
      try {
        sessionStorage.removeItem(STORAGE_KEY);
        sessionStorage.removeItem(STORAGE_TIME_KEY);
      } catch {}
    }

    // ── 状态 ──────────────────────────────────────────────
    function setState(text, type) {
      els.messageState.textContent = text;
      els.messageState.classList.remove('ready', 'error');
      if (type) els.messageState.classList.add(type);
    }

    // ── 日志 ──────────────────────────────────────────────
    function addLog(message, type) {
      const time = new Intl.DateTimeFormat('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="log-time">[${time}]</span> ${escapeHtml(message)}`;
      els.logContent.appendChild(entry);
      els.logContent.scrollTop = els.logContent.scrollHeight;
    }

    function clearLog() {
      els.logContent.innerHTML = '';
      addLog('日志已清空', 'info');
    }

    // ── JSON 折叠 ─────────────────────────────────────────
    function toggleJson() {
      const hidden = els.jsonContent.classList.toggle('json-collapsed');
      els.btnToggleJson.textContent = hidden ? '展开查看' : '收起';
    }

  })();
  </script>
</body>
</html>
