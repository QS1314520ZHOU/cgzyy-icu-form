<div class="config-container">
  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="toolbar-left">
      <select [(ngModel)]="selectedDeptCode" (ngModelChange)="onDeptChange($event)" class="select-dept">
        <option [ngValue]="null">-- 选择科室 --</option>
        <option *ngFor="let dept of departments" [ngValue]="dept.code">
          {{ getDeptDisplayName(dept) }}
        </option>
      </select>

      <select class="select-level" disabled>
        <option>提醒等级</option>
      </select>
    </div>

    <div class="toolbar-right">
      <button class="btn btn-secondary" (click)="showCopyDialog = true" [disabled]="!selectedDeptCode">
        复制到其他科室
      </button>
      <button class="btn btn-secondary" (click)="resetConfig()" [disabled]="!selectedDeptCode">
        恢复初始值
      </button>
      <button class="btn btn-primary" (click)="saveConfig()" [disabled]="!selectedDeptCode || saving">
        {{ saving ? '保存中...' : '保存' }}
      </button>
    </div>
  </div>

  <!-- 未选择科室提示 -->
  <div *ngIf="!selectedDeptCode" class="placeholder">
    <p>请先选择科室</p>
  </div>

  <!-- 加载中 -->
  <div *ngIf="loading" class="placeholder">
    <p>加载中...</p>
  </div>

  <!-- 主内容区 -->
  <div *ngIf="selectedDeptCode && !loading" class="main-content">
    <!-- 左侧分类 -->
    <div class="sidebar">
      <div class="category active">
        <span class="category-icon">📋</span>
        <span>评分</span>
      </div>
      <div class="category disabled">
        <span class="category-icon">💊</span>
        <span>医嘱护理</span>
      </div>
      <div class="category disabled">
        <span class="category-icon">🔧</span>
        <span>管道</span>
      </div>
      <div class="category disabled">
        <span class="category-icon">📦</span>
        <span>Bundle提醒</span>
      </div>
      <div class="category disabled">
        <span class="category-icon">⚠️</span>
        <span>危急值</span>
      </div>
      <div class="category disabled">
        <span class="category-icon">🏥</span>
        <span>单病种</span>
      </div>
    </div>

    <!-- 中间：评分选择 -->
    <div class="score-list">
      <h3>评分选择</h3>

      <!-- 医生评分 -->
      <div class="score-group">
        <h4>医生评分</h4>
        <div *ngFor="let item of doctorScoreList"
             class="score-item"
             [class.selected]="selectedScoreType === item.scoreType"
             (click)="selectScoreType(item.scoreType)">
          {{ item.scoreName }}
        </div>
      </div>

      <!-- 护理评分 -->
      <div class="score-group">
        <h4>护理评分</h4>
        <div *ngFor="let item of nurseScoreList"
             class="score-item"
             [class.selected]="selectedScoreType === item.scoreType"
             (click)="selectScoreType(item.scoreType)">
          {{ item.scoreName }}
        </div>
      </div>
    </div>

    <!-- 右侧：配置区 -->
    <div class="config-area">
      <div *ngIf="!selectedScoreType" class="placeholder-small">
        <p>请选择评分项</p>
      </div>

      <div *ngIf="selectedScoreType && getSelectedItem() as item" class="config-form">
        <h3>{{ item.scoreName }} 配置</h3>

        <!-- 启用开关 -->
        <div class="form-group">
          <label>
            <input type="checkbox" [(ngModel)]="item.enabled">
            启用
          </label>
        </div>

        <!-- 提醒等级 -->
        <div class="form-group">
          <label>提醒等级</label>
          <select [(ngModel)]="item.level" class="form-control">
            <option value="low">低级</option>
            <option value="mid">中级</option>
            <option value="high">高级</option>
          </select>
        </div>

        <!-- 入科多少小时未评分即弹框 -->
        <div class="form-group">
          <label>入科多少小时未评分即弹框</label>
          <input type="number" [(ngModel)]="item.admissionNoScoreHours" class="form-control" min="1">
        </div>

        <!-- 评分间隔 -->
        <div class="form-group">
          <label>评分间隔（天）</label>
          <input type="number" [(ngModel)]="item.intervalDays" class="form-control" min="1">
        </div>

        <!-- 分值范围规则 -->
        <div class="form-group">
          <label>分值范围规则</label>
          <div *ngFor="let rule of item.rangeRules; let i = index" class="range-rule">
            <input type="number" [(ngModel)]="rule.min" class="form-control-sm" placeholder="最小值">
            <span>~</span>
            <input type="number" [(ngModel)]="rule.max" class="form-control-sm" placeholder="最大值">
            <span>间隔</span>
            <input type="number" [(ngModel)]="rule.intervalDays" class="form-control-sm" placeholder="天数">
            <span>天</span>
            <button class="btn btn-danger btn-sm" (click)="removeRangeRule(i)">删除</button>
          </div>
          <button class="btn btn-secondary btn-sm" (click)="addRangeRule()">添加规则</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 复制对话框 -->
  <div *ngIf="showCopyDialog" class="modal-overlay" (click)="showCopyDialog = false">
    <div class="modal" (click)="$event.stopPropagation()">
      <h3>复制到其他科室</h3>
      <div class="modal-body">
        <div *ngFor="let dept of departments" class="dept-checkbox">
          <label *ngIf="dept.code !== selectedDeptCode">
            <input type="checkbox" [checked]="targetDeptCodes.includes(dept.code)"
                   (change)="targetDeptCodes.includes(dept.code) ? targetDeptCodes.splice(targetDeptCodes.indexOf(dept.code), 1) : targetDeptCodes.push(dept.code)">
            {{ getDeptDisplayName(dept) }}
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="showCopyDialog = false">取消</button>
        <button class="btn btn-primary" (click)="copyToOtherDepts()" [disabled]="targetDeptCodes.length === 0">
          复制
        </button>
      </div>
    </div>
  </div>
</div>
