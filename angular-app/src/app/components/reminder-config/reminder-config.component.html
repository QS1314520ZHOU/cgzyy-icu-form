<div class="config-container">
  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="toolbar-left">
      <select [(ngModel)]="selectedDeptCode" (ngModelChange)="onDeptChange($event)" class="form-control">
        <option [ngValue]="null">-- 选择科室 --</option>
        <option *ngFor="let d of departments" [ngValue]="d.code">{{ getDeptDisplayName(d) }}</option>
      </select>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-secondary" (click)="showCopyDialog=true" [disabled]="!selectedDeptCode">复制到其他科室</button>
      <button class="btn btn-secondary" (click)="resetConfig()" [disabled]="!selectedDeptCode">恢复初始值</button>
      <button class="btn btn-primary" (click)="saveConfig()" [disabled]="!selectedDeptCode||saving">{{ saving?'保存中...':'保存' }}</button>
    </div>
  </div>

  <div *ngIf="!selectedDeptCode" class="placeholder"><p>请先选择科室</p></div>
  <div *ngIf="loading" class="placeholder"><p>加载中...</p></div>

  <div *ngIf="selectedDeptCode && !loading" class="main-content">
    <!-- 全局设置 -->
    <div class="global-settings" *ngIf="config">
      <div class="setting-row">
        <label>已知晓后</label>
        <input type="number" [(ngModel)]="config.ackSnooze.value" class="form-control-sm" min="1">
        <select [(ngModel)]="config.ackSnooze.unit" class="form-control-sm">
          <option value="minute">分钟</option>
          <option value="hour">小时</option>
          <option value="day">天</option>
        </select>
        <span>再提示</span>
      </div>
    </div>

    <!-- 左侧分类 -->
    <div class="sidebar">
      <div class="category active"><span>📋</span><span>评分</span></div>
      <div class="category disabled"><span>💊</span><span>医嘱护理</span></div>
      <div class="category disabled"><span>🔧</span><span>管道</span></div>
      <div class="category disabled"><span>📦</span><span>Bundle提醒</span></div>
      <div class="category disabled"><span>⚠️</span><span>危急值</span></div>
      <div class="category disabled"><span>🏥</span><span>单病种</span></div>
    </div>

    <!-- 中间：评分选择 -->
    <div class="score-list">
      <h3>评分选择</h3>
      <div class="score-group"><h4>医生评分</h4>
        <div *ngFor="let s of doctorScoreList" class="score-item" [class.selected]="selectedScoreType===s.scoreType" (click)="selectScoreType(s.scoreType)">
          {{ s.scoreName }}
          <span *ngIf="isItemEnabled(s.scoreType)" class="badge-on">已启用</span>
        </div>
      </div>
      <div class="score-group"><h4>护理评分</h4>
        <div *ngFor="let s of nurseScoreList" class="score-item" [class.selected]="selectedScoreType===s.scoreType" (click)="selectScoreType(s.scoreType)">
          {{ s.scoreName }}
          <span *ngIf="isItemEnabled(s.scoreType)" class="badge-on">已启用</span>
        </div>
      </div>
    </div>

    <!-- 右侧配置 -->
    <div class="config-area">
      <div *ngIf="!selectedScoreType" class="placeholder-small"><p>请选择评分项</p></div>

      <div *ngIf="selectedScoreType && getSelectedItem() as item" class="config-form">
        <h3>{{ item.scoreName }} 配置</h3>

        <!-- 总开关 + 提醒等级 -->
        <div class="form-row">
          <div class="form-group">
            <label class="toggle-label">
              <input type="checkbox" [(ngModel)]="item.enabled">
              <span>启用此项提醒</span>
            </label>
          </div>
          <div class="form-group">
            <label>提醒等级</label>
            <select [(ngModel)]="item.level" class="form-control">
              <option value="low">低级</option>
              <option value="mid">中级</option>
              <option value="high">高级</option>
            </select>
          </div>
        </div>

        <!-- A: 入科未评分 -->
        <!-- ★ header 始终可点，disabled 只作用于 body -->
        <div class="rule-block">
          <div class="rule-header">
            <label class="toggle-label">
              <input type="checkbox" [(ngModel)]="item.admissionRule.enabled">
              <span>A. 入科未评分即弹框</span>
            </label>
          </div>
          <div class="rule-body" [class.disabled]="!item.admissionRule.enabled">
            <span>入科</span>
            <input type="number" [(ngModel)]="item.admissionRule.value" class="form-control-sm" min="1">
            <select [(ngModel)]="item.admissionRule.unit" class="form-control-sm">
              <option value="hour">小时</option>
              <option value="day">天</option>
            </select>
            <span>未评分即提醒</span>
          </div>
        </div>

        <!-- B: 固定间隔 -->
        <div class="rule-block">
          <div class="rule-header">
            <label class="toggle-label">
              <input type="checkbox" [(ngModel)]="item.intervalRule.enabled">
              <span>B. 距上次评分固定间隔</span>
            </label>
          </div>
          <div class="rule-body" [class.disabled]="!item.intervalRule.enabled">
            <span>距上次评分</span>
            <input type="number" [(ngModel)]="item.intervalRule.value" class="form-control-sm" min="1">
            <select [(ngModel)]="item.intervalRule.unit" class="form-control-sm">
              <option value="hour">小时</option>
              <option value="day">天</option>
            </select>
            <span>未评分即提醒</span>
          </div>
        </div>

        <!-- C: 分值区间间隔 -->
        <div class="rule-block">
          <div class="rule-header">
            <label class="toggle-label">
              <input type="checkbox" [(ngModel)]="item.rangeRule.enabled">
              <span>C. 分值区间间隔复评</span>
            </label>
          </div>
          <div class="rule-body" [class.disabled]="!item.rangeRule.enabled">
            <div *ngFor="let r of item.rangeRule.rules; let i = index" class="range-rule-row">
              <span>分值</span>
              <input type="number" [(ngModel)]="r.min" class="form-control-sm">
              <span>~</span>
              <input type="number" [(ngModel)]="r.max" class="form-control-sm">
              <span>间隔</span>
              <input type="number" [(ngModel)]="r.value" class="form-control-sm" min="1">
              <select [(ngModel)]="r.unit" class="form-control-sm">
                <option value="hour">小时</option>
                <option value="day">天</option>
              </select>
              <button class="btn btn-danger btn-sm" (click)="removeRangeRuleItem(i)">删除</button>
            </div>
            <button class="btn btn-secondary btn-sm" (click)="addRangeRuleItem()">添加规则</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 复制对话框 -->
  <div *ngIf="showCopyDialog" class="modal-overlay" (click)="showCopyDialog=false">
    <div class="modal" (click)="$event.stopPropagation()">
      <h3>复制到其他科室</h3>
      <div class="modal-body">
        <label *ngFor="let d of departments" class="dept-checkbox" [hidden]="d.code===selectedDeptCode">
          <input type="checkbox" [checked]="targetDeptCodes.includes(d.code)" (change)="targetDeptCodes.includes(d.code)?targetDeptCodes.splice(targetDeptCodes.indexOf(d.code),1):targetDeptCodes.push(d.code)">
          {{ getDeptDisplayName(d) }}
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="showCopyDialog=false">取消</button>
        <button class="btn btn-primary" (click)="copyToOtherDepts()" [disabled]="!targetDeptCodes.length">复制</button>
      </div>
    </div>
  </div>
</div>
