<!-- 患者完整信息 -->
<div class="content-block">
  <h3 class="section-title">患者完整信息</h3>
  <div class="table-wrap">
    <table class="field-table">
      <thead>
        <tr>
          <th>字段</th>
          <th>值</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of patientRows">
          <td>{{ row.key }}</td>
          <td>
            <span *ngIf="row.value === '-'" class="null-value">-</span>
            <pre *ngIf="row.value !== '-' && row.value.startsWith('{')" class="nested-json">{{ row.value }}</pre>
            <span *ngIf="row.value !== '-' && !row.value.startsWith('{')">{{ row.value }}</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 原始 JSON -->
<div class="content-block">
  <h3 class="section-title">完整原始 JSON</h3>
  <button class="json-toggle" type="button" (click)="toggleJson()">
    {{ showJson ? '收起' : '展开查看' }}
  </button>
  <pre *ngIf="showJson" class="code-block code-block-light">{{ jsonData }}</pre>
</div>
