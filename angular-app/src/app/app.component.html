<!-- 状态栏 -->
<section class="panel no-print">
  <div class="panel-title-row">
    <h2>连接状态</h2>
    <span class="state-badge" [class.ready]="connectionState === 'received'" [class.error]="connectionState === 'error'">
      {{ stateText }}
    </span>
  </div>
  <p class="panel-tip">本页嵌入 SmartCare 系统，通过 postMessage 接收患者/账号数据。</p>
</section>

<!-- 置顶关键信息 -->
<app-patient-info
  *ngIf="currentData?.patient"
  [patient]="currentData!.patient"
  [updatedAt]="updatedAt">
</app-patient-info>

<!-- 通信日志 -->
<app-log-panel (clearLog)="clearLog()"></app-log-panel>

<!-- 数据输出 -->
<section class="panel">
  <div class="panel-title-row">
    <h2>数据输出</h2>
  </div>

  <div *ngIf="isEmpty" class="empty-state">
    <p>当前还没有数据。</p>
    <p>等待 SmartCare 宿主通过 <code>postMessage</code> 下发数据。</p>
  </div>

  <div *ngIf="!isEmpty && currentData" class="content-area">
    <!-- 账号信息 -->
    <app-account-info
      *ngIf="currentData.account"
      [account]="currentData.account">
    </app-account-info>

    <!-- 患者完整信息 -->
    <app-data-output
      *ngIf="currentData.patient"
      [patient]="currentData.patient"
      [account]="currentData.account"
      [token]="currentData.token">
    </app-data-output>
  </div>
</section>

<!-- 内层 iframe -->
<section class="panel no-print">
  <div class="panel-title-row">
    <h2>内层数据预览</h2>
  </div>
  <div style="border:1px solid #d9e4f2; border-radius:14px; overflow:hidden; height:400px;">
    <iframe #childFrame src="/print" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</section>

<!-- 评分提醒弹窗 -->
<app-score-reminder></app-score-reminder>
